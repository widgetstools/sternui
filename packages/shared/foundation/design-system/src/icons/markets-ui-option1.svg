<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none">
  <!-- OPTION 1: Abstract Geometric — interlocking diamond facets suggesting trading flow -->
  <defs>
    <clipPath id="clip1"><rect width="512" height="512" rx="108"/></clipPath>
    <linearGradient id="g1a" x1="0" y1="0" x2="512" y2="512" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0f172a"/><stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <linearGradient id="g1b" x1="100" y1="400" x2="400" y2="100" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#06b6d4"/><stop offset="100%" stop-color="#3b82f6"/>
    </linearGradient>
    <linearGradient id="g1c" x1="200" y1="500" x2="400" y2="100" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#8b5cf6"/><stop offset="100%" stop-color="#c084fc"/>
    </linearGradient>
    <linearGradient id="g1d" x1="50" y1="300" x2="450" y2="200" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#22d3ee"/><stop offset="100%" stop-color="#6366f1"/>
    </linearGradient>
  </defs>
  <g clip-path="url(#clip1)">
    <rect width="512" height="512" fill="url(#g1a)"/>

    <!-- Subtle grid — terminal feel -->
    <g stroke="#334155" stroke-width="0.5" opacity="0.4">
      <line x1="0" y1="128" x2="512" y2="128"/>
      <line x1="0" y1="256" x2="512" y2="256"/>
      <line x1="0" y1="384" x2="512" y2="384"/>
      <line x1="128" y1="0" x2="128" y2="512"/>
      <line x1="256" y1="0" x2="256" y2="512"/>
      <line x1="384" y1="0" x2="384" y2="512"/>
    </g>

    <!-- Central diamond prism — large facet -->
    <polygon points="256,80 420,256 256,432 92,256" fill="none" stroke="url(#g1b)" stroke-width="3"/>

    <!-- Inner rotated diamond — offset for depth -->
    <polygon points="256,140 370,256 256,372 142,256" fill="url(#g1b)" opacity="0.12"/>

    <!-- Left facet shard -->
    <polygon points="92,256 256,80 256,256" fill="url(#g1b)" opacity="0.35"/>

    <!-- Right facet shard -->
    <polygon points="420,256 256,80 256,256" fill="url(#g1c)" opacity="0.35"/>

    <!-- Bottom-left facet -->
    <polygon points="92,256 256,432 256,256" fill="url(#g1d)" opacity="0.25"/>

    <!-- Bottom-right facet -->
    <polygon points="420,256 256,432 256,256" fill="url(#g1c)" opacity="0.2"/>

    <!-- Horizontal crossing lines — exchange/flow -->
    <line x1="60" y1="210" x2="452" y2="210" stroke="#22d3ee" stroke-width="2" opacity="0.5"/>
    <line x1="60" y1="302" x2="452" y2="302" stroke="#8b5cf6" stroke-width="2" opacity="0.5"/>

    <!-- Bright center node — focal point -->
    <circle cx="256" cy="256" r="12" fill="#22d3ee" opacity="0.9"/>
    <circle cx="256" cy="256" r="6" fill="#ffffff" opacity="0.8"/>

    <!-- Corner nodes — connectivity -->
    <circle cx="256" cy="80" r="6" fill="#3b82f6" opacity="0.7"/>
    <circle cx="420" cy="256" r="6" fill="#8b5cf6" opacity="0.7"/>
    <circle cx="256" cy="432" r="6" fill="#06b6d4" opacity="0.7"/>
    <circle cx="92" cy="256" r="6" fill="#22d3ee" opacity="0.7"/>

    <!-- Thin inner border -->
    <rect x="8" y="8" width="496" height="496" rx="100" fill="none" stroke="#22d3ee" stroke-width="1" opacity="0.15"/>
  </g>
</svg>
