<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none">
  <defs>
    <!-- Background gradient -->
    <linearGradient id="bg" x1="0" y1="0" x2="512" y2="512" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0f0f14"/>
      <stop offset="100%" stop-color="#1a1a2e"/>
    </linearGradient>
    <!-- Accent gradient (teal/cyan) -->
    <linearGradient id="accent" x1="100" y1="400" x2="412" y2="100" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#14b8a6"/>
      <stop offset="50%" stop-color="#22d3ee"/>
      <stop offset="100%" stop-color="#67e8f9"/>
    </linearGradient>
    <!-- Glow gradient for the chart line -->
    <linearGradient id="glow" x1="100" y1="400" x2="412" y2="100" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#14b8a6" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#22d3ee" stop-opacity="0"/>
    </linearGradient>
    <!-- Subtle grid pattern -->
    <pattern id="grid" width="48" height="48" patternUnits="userSpaceOnUse">
      <path d="M 48 0 L 0 0 0 48" fill="none" stroke="#ffffff" stroke-opacity="0.04" stroke-width="1"/>
    </pattern>
    <!-- Drop shadow filter -->
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="16" flood-color="#000000" flood-opacity="0.5"/>
    </filter>
    <!-- Line glow filter -->
    <filter id="line-glow" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Rounded square background -->
  <rect width="512" height="512" rx="96" fill="url(#bg)" filter="url(#shadow)"/>

  <!-- Subtle border -->
  <rect x="1" y="1" width="510" height="510" rx="95" fill="none" stroke="#ffffff" stroke-opacity="0.08" stroke-width="1.5"/>

  <!-- Grid overlay -->
  <rect x="56" y="56" width="400" height="400" rx="8" fill="url(#grid)"/>

  <!-- Area fill under the chart line -->
  <path d="M 100 340 L 168 310 L 236 350 L 290 260 L 340 220 L 412 140 L 412 400 L 100 400 Z" fill="url(#glow)"/>

  <!-- Main chart line (uptrend with dip) -->
  <path d="M 100 340 L 168 310 L 236 350 L 290 260 L 340 220 L 412 140"
        stroke="url(#accent)" stroke-width="6" stroke-linecap="round" stroke-linejoin="round" fill="none"
        filter="url(#line-glow)"/>

  <!-- Data points -->
  <circle cx="100" cy="340" r="6" fill="#14b8a6"/>
  <circle cx="168" cy="310" r="5" fill="#1cd4ae"/>
  <circle cx="236" cy="350" r="5" fill="#1cd4ae"/>
  <circle cx="290" cy="260" r="6" fill="#22d3ee"/>
  <circle cx="340" cy="220" r="5" fill="#4ae0f0"/>
  <circle cx="412" cy="140" r="8" fill="#67e8f9"/>
  <circle cx="412" cy="140" r="14" fill="#67e8f9" opacity="0.2"/>

  <!-- "M" letterform (stylized, geometric) -->
  <g transform="translate(136, 82)" opacity="0.15">
    <path d="M 0 70 L 0 0 L 40 40 L 80 0 L 80 70" stroke="#ffffff" stroke-width="8" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  </g>

  <!-- Horizontal baseline -->
  <line x1="80" y1="400" x2="432" y2="400" stroke="#ffffff" stroke-opacity="0.1" stroke-width="1.5"/>

  <!-- Vertical axis ticks -->
  <line x1="80" y1="140" x2="80" y2="400" stroke="#ffffff" stroke-opacity="0.06" stroke-width="1"/>
  <line x1="80" y1="200" x2="86" y2="200" stroke="#ffffff" stroke-opacity="0.15" stroke-width="1.5"/>
  <line x1="80" y1="260" x2="86" y2="260" stroke="#ffffff" stroke-opacity="0.15" stroke-width="1.5"/>
  <line x1="80" y1="320" x2="86" y2="320" stroke="#ffffff" stroke-opacity="0.15" stroke-width="1.5"/>
</svg>
