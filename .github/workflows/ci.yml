name: CI

on:
  push:
    branches: [main, feat/consolidation]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: '20'
  TURBO_TELEMETRY_DISABLED: 1

jobs:
  install:
    name: Install + cache
    runs-on: ubuntu-latest
    outputs:
      node-version: ${{ env.NODE_VERSION }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: npm ci
        run: npm ci

  packages:
    name: Packages (build + typecheck + test)
    needs: install
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - run: npm ci
      - name: Build packages
        run: npm run build:packages
      - name: Typecheck packages
        run: npm run typecheck:packages
      - name: Unit tests (packages)
        run: npm run test:packages

  consumer:
    name: Consumer apps (tarball build + typecheck)
    needs: packages
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - run: npm ci
      - name: Build packages
        run: npm run build:packages
      - name: Pack bucket tarballs + sync apps
        run: node scripts/propagate.mjs
      - name: Build consumer apps
        run: npm run build:apps
      - name: Typecheck consumer apps
        run: npm run typecheck:apps
      - name: Upload demo-react bundle
        uses: actions/upload-artifact@v4
        with:
          name: demo-react-dist
          path: apps/demo-react/dist
          retention-days: 7
          if-no-files-found: warn

  tarballs:
    name: Tarball freshness (committed libs/)
    needs: packages
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - run: npm ci
      - name: Verify libs/ tarballs match package build output
        run: npm run check:tarballs

  cross-platform:
    name: Consumer verify (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: npm ci
        run: npm ci

      - name: Consumer build + typecheck
        run: npm run verify:consumer
