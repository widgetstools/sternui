name: E2E (Playwright)

on:
  push:
    branches: [main, feat/consolidation]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: e2e-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: '20'
  TURBO_TELEMETRY_DISABLED: 1

jobs:
  e2e:
    name: Playwright — demo-react
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: npm ci
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Build dependencies
        # Build EVERY workspace package — Playwright's webServer config
        # in playwright.config.ts starts dev servers for demo-react,
        # demo-configservice-react, AND markets-ui-react-reference. The
        # other two still import @starui/vite-workspace-aliases in their
        # vite.config.ts, and that package has main:"dist/index.js" so
        # its dist/ must exist before the dev server tries to load it.
        # The previous `--filter=@starui/demo-react...` was too narrow.
        run: npx turbo build

      - name: Run Playwright
        run: npx playwright test

      - name: Upload report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14
          if-no-files-found: ignore

      - name: Upload traces
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-traces
          path: test-results/
          retention-days: 14
          if-no-files-found: ignore
