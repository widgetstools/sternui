<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none">
  <!-- OPTION 2: Stylized "M" — candlestick geometry, warm palette, transparent bg -->
  <defs>
    <clipPath id="clip2"><rect width="512" height="512" rx="108"/></clipPath>
    <linearGradient id="g2m" x1="80" y1="420" x2="440" y2="80" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#f59e0b"/>
      <stop offset="40%" stop-color="#f97316"/>
      <stop offset="75%" stop-color="#ef4444"/>
      <stop offset="100%" stop-color="#e11d48"/>
    </linearGradient>
    <linearGradient id="g2wick" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0%" stop-color="#f59e0b"/><stop offset="100%" stop-color="#fbbf24"/>
    </linearGradient>
    <linearGradient id="g2wick2" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0%" stop-color="#ef4444"/><stop offset="100%" stop-color="#f87171"/>
    </linearGradient>
    <filter id="glow2" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="6" result="b"/>
      <feComposite in="SourceGraphic" in2="b" operator="over"/>
    </filter>
  </defs>
  <g clip-path="url(#clip2)">
    <!-- Subtle price grid — mid-grey works on both light and dark -->
    <g stroke="#94a3b8" stroke-width="0.8" opacity="0.25">
      <line x1="0" y1="120" x2="512" y2="120"/>
      <line x1="0" y1="200" x2="512" y2="200"/>
      <line x1="0" y1="280" x2="512" y2="280"/>
      <line x1="0" y1="360" x2="512" y2="360"/>
    </g>

    <!-- "M" built from candlestick-style vertical strokes -->
    <g filter="url(#glow2)">
      <!-- Left leg — tall candle body -->
      <rect x="88" y="120" width="40" height="280" rx="4" fill="url(#g2m)"/>
      <!-- Left wick up -->
      <line x1="108" y1="90" x2="108" y2="120" stroke="url(#g2wick)" stroke-width="5" stroke-linecap="round"/>

      <!-- Left diagonal rise — ascending price -->
      <rect x="148" y="190" width="28" height="120" rx="4" fill="url(#g2m)" opacity="0.7" transform="rotate(-22 162 250)"/>

      <!-- Center V-bottom — the dip/valley -->
      <rect x="222" y="260" width="28" height="140" rx="4" fill="url(#g2m)" opacity="0.6"/>
      <!-- Center wick down -->
      <line x1="236" y1="400" x2="236" y2="430" stroke="#f97316" stroke-width="5" stroke-linecap="round"/>
      <!-- Center candle top wick -->
      <line x1="236" y1="230" x2="236" y2="260" stroke="#f97316" stroke-width="5" stroke-linecap="round"/>

      <!-- Right diagonal rise -->
      <rect x="296" y="190" width="28" height="120" rx="4" fill="url(#g2m)" opacity="0.7" transform="rotate(22 310 250)"/>

      <!-- Right leg — tall candle body -->
      <rect x="384" y="120" width="40" height="280" rx="4" fill="url(#g2m)"/>
      <!-- Right wick up -->
      <line x1="404" y1="90" x2="404" y2="120" stroke="url(#g2wick2)" stroke-width="5" stroke-linecap="round"/>
    </g>

    <!-- Horizontal price level markers — neutral grey -->
    <line x1="60" y1="160" x2="452" y2="160" stroke="#fbbf24" stroke-width="1" opacity="0.25" stroke-dasharray="8 6"/>
    <line x1="60" y1="340" x2="452" y2="340" stroke="#ef4444" stroke-width="1" opacity="0.25" stroke-dasharray="8 6"/>

    <!-- Bid/Ask spread dots -->
    <circle cx="108" cy="160" r="5" fill="#fbbf24" opacity="0.6"/>
    <circle cx="404" cy="160" r="5" fill="#f87171" opacity="0.6"/>
  </g>
</svg>
