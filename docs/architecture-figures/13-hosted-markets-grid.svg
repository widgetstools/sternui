<text x='616' y='360.5' style='font-size:11px;font-weight:400;fill:#38475f;text-anchor:start;font-family:"Inter", "Segoe UI", "Helvetica Neue", system-ui, Arial, sans-serif'>≈ 225 LOC of wrapper + hooks</text>
