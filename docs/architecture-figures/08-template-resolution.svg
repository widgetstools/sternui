<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 540" font-family='"Inter", "Segoe UI", "Helvetica Neue", system-ui, Arial, sans-serif' style='background:transparent'>
<defs>
  <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
    <feDropShadow dx="0" dy="1.5" stdDeviation="1.5" flood-color="#1b2944" flood-opacity="0.08"/>
  </filter>
  <marker id="arrow"          markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto" markerUnits="userSpaceOnUse">
    <path d="M0,0 L8,5 L0,10 L2,5 Z" fill="#38475f"/>
  </marker>
  <marker id="arrow-soft"     markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto" markerUnits="userSpaceOnUse">
    <path d="M0,0 L8,5 L0,10 L2,5 Z" fill="#5b6b8a"/>
  </marker>
  <marker id="arrow-accent"   markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto" markerUnits="userSpaceOnUse">
    <path d="M0,0 L8,5 L0,10 L2,5 Z" fill="#2952cc"/>
  </marker>
</defs>
<text x='40' y='36' style='font-size:18px;font-weight:600;fill:#1b2944;text-anchor:start;font-family:"Inter", "Segoe UI", "Helvetica Neue", system-ui, Arial, sans-serif'>Template resolution — {{name.key}}  then  [token]</text>
<text x='40' y='58' style='font-size:12px;font-weight:400;fill:#5b6b8a;text-anchor:start;font-family:"Inter", "Segoe UI", "Helvetica Neue", system-ui, Arial, sans-serif'>Two stages: AppData lookup on the main thread, per-attach IDs in the worker.</text>
<rect x="40" y="68" width="48" height="3" rx="1.5" ry="1.5" fill="#c2870c"/>
<rect x="40" y="110" width="920" height="80" rx="8" ry="8" fill="#f7f9fc" stroke="#d8dfeb" stroke-width="1.0" filter="url(#shadow)"/>
<text x='56' y='132' style='font-size:11px;font-weight:600;fill:#5b6b8a;text-anchor:start;font-family:"Inter", "Segoe UI", "Helvetica Neue", system-ui, Arial, sans-serif'>User-authored provider config</text>
<text x='56' y='152.0' style='font-size:11px;font-weight:400;fill:#38475f;text-anchor:start;font-family:"JetBrains Mono", "SF Mono", Menlo, Consolas, monospace'>listenerTopic:  /topic/positions/{{user.id}}/[clientTag]</text>
<text x='56' y='167.95' style='font-size:11px;font-weight:400;fill:#38475f;text-anchor:start;font-family:"JetBrains Mono", "SF Mono", Menlo, Consolas, monospace'>requestBody:    {"corr":"[clientTag]","tag":"[corr]"}</text>
<text x='56' y='183.9' style='font-size:11px;font-weight:400;fill:#38475f;text-anchor:start;font-family:"JetBrains Mono", "SF Mono", Menlo, Consolas, monospace'>websocketUrl:   wss://{{infra.host}}:{{infra.port}}</text>
<rect x="40" y="230" width="440" height="200" rx="8" ry="8" fill="#ffffff" stroke="#d8dfeb" stroke-width="1.0" filter="url(#shadow)"/>
<rect x="40" y="230" width="3" height="200" rx="1.5" ry="1.5" fill="#2952cc"/>
<text x='56' y='252' style='font-size:14px;font-weight:600;fill:#1b2944;text-anchor:start;font-family:"Inter", "Segoe UI", "Helvetica Neue", system-ui, Arial, sans-serif'>① Main thread — useResolvedCfg</text>
<text x='56' y='274.0' style='font-size:11px;font-weight:400;fill:#38475f;text-anchor:start;font-family:"Inter", "Segoe UI", "Helvetica Neue", system-ui, Arial, sans-serif'>resolveCfg(cfg, lookup)</text>
<text x='56' y='291.05' style='font-size:11px;font-weight:400;fill:#38475f;text-anchor:start;font-family:"Inter", "Segoe UI", "Helvetica Neue", system-ui, Arial, sans-serif'>• deep-walks every string in the config</text>
<text x='56' y='308.1' style='font-size:11px;font-weight:400;fill:#38475f;text-anchor:start;font-family:"Inter", "Segoe UI", "Helvetica Neue", system-ui, Arial, sans-serif'>• replaces {{name.key}}  →  AppData[name][key]</text>
<text x='56' y='325.15' style='font-size:11px;font-weight:400;fill:#38475f;text-anchor:start;font-family:"Inter", "Segoe UI", "Helvetica Neue", system-ui, Arial, sans-serif'>• AppData mutation → hook re-attaches</text>
<text x='56' y='342.2' style='font-size:11px;font-weight:400;fill:#38475f;text-anchor:start;font-family:"Inter", "Segoe UI", "Helvetica Neue", system-ui, Arial, sans-serif'></text>
<text x='56' y='359.25' style='font-size:11px;font-weight:400;fill:#38475f;text-anchor:start;font-family:"Inter", "Segoe UI", "Helvetica Neue", system-ui, Arial, sans-serif'>When step 1 finishes:</text>
<text x='56' y='376.3' style='font-size:11px;font-weight:400;fill:#38475f;text-anchor:start;font-family:"Inter", "Segoe UI", "Helvetica Neue", system-ui, Arial, sans-serif'>  braces gone, [brackets] remain.</text>
<rect x="520" y="230" width="440" height="200" rx="8" ry="8" fill="#ffffff" stroke="#d8dfeb" stroke-width="1.0" filter="url(#shadow)"/>
<rect x="520" y="230" width="3" height="200" rx="1.5" ry="1.5" fill="#c0532c"/>
<text x='536' y='252' style='font-size:14px;font-weight:600;fill:#1b2944;text-anchor:start;font-family:"Inter", "Segoe UI", "Helvetica Neue", system-ui, Arial, sans-serif'>② SharedWorker — startProvider</text>
<text x='536' y='274.0' style='font-size:11px;font-weight:400;fill:#38475f;text-anchor:start;font-family:"Inter", "Segoe UI", "Helvetica Neue", system-ui, Arial, sans-serif'>resolveBracketCfg(cfg, cache)</text>
<text x='536' y='291.05' style='font-size:11px;font-weight:400;fill:#38475f;text-anchor:start;font-family:"Inter", "Segoe UI", "Helvetica Neue", system-ui, Arial, sans-serif'>• fresh BracketCache per startProvider</text>
<text x='536' y='308.1' style='font-size:11px;font-weight:400;fill:#38475f;text-anchor:start;font-family:"Inter", "Segoe UI", "Helvetica Neue", system-ui, Arial, sans-serif'>• [name] → 12-char alphanumeric ID</text>
<text x='536' y='325.15' style='font-size:11px;font-weight:400;fill:#38475f;text-anchor:start;font-family:"Inter", "Segoe UI", "Helvetica Neue", system-ui, Arial, sans-serif'>• same [name] resolves identically across</text>
<text x='536' y='342.2' style='font-size:11px;font-weight:400;fill:#38475f;text-anchor:start;font-family:"Inter", "Segoe UI", "Helvetica Neue", system-ui, Arial, sans-serif'>  every field of one config</text>
<text x='536' y='359.25' style='font-size:11px;font-weight:400;fill:#38475f;text-anchor:start;font-family:"Inter", "Segoe UI", "Helvetica Neue", system-ui, Arial, sans-serif'>• stop + re-attach mints a fresh value</text>
<line x1="480" y1="330.0" x2="520" y2="330.0" stroke="#38475f" stroke-width="1.4" marker-end="url(#arrow)"/>
<rect x="479.75" y="315.0" width="40.5" height="14" rx="3" ry="3" fill="#ffffff" stroke="#e6ebf3"/>
<text x='500.0' y='326.0' style='font-size:10px;font-weight:500;fill:#5b6b8a;text-anchor:middle;font-family:"Inter", "Segoe UI", "Helvetica Neue", system-ui, Arial, sans-serif'>cfg →</text>
<path d="M40 460 H946 L960 474 V520 H40 Z" fill="#fff2d1" stroke="#c2870c" stroke-width="0.8"/>
<path d="M946 460 V474 H960" fill="none" stroke="#c2870c" stroke-width="0.8"/>
<text x='52' y='478.0' style='font-size:11px;font-weight:400;fill:#38475f;text-anchor:start;font-family:"Inter", "Segoe UI", "Helvetica Neue", system-ui, Arial, sans-serif'>Grammar:  /[A-Za-z_][A-Za-z0-9_-]*/  — non-matching tokens (JSON arrays like [1,2,3]) are left untouched.</text>
</svg>
